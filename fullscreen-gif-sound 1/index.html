<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cookie Consent | Fullscreen Video with Sound</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            position: relative;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        /* Затемненный фон для модального окна */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
            opacity: 1;
        }

        /* Модальное окно с согласием */
        .cookie-modal {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 28px;
            max-width: 480px;
            width: 90%;
            padding: 32px 28px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1);
            animation: modalSlideIn 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .cookie-icon {
            font-size: 64px;
            margin-bottom: 16px;
            display: inline-block;
        }

        .cookie-modal h2 {
            color: #fff;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: -0.3px;
        }

        .cookie-modal p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 28px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            font-family: inherit;
        }

        .btn-primary {
            background: #6366f1;
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            background: #4f52e0;
            transform: scale(1.02);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-primary:active, .btn-secondary:active {
            transform: scale(0.98);
        }

        /* Контейнер с видео (изначально скрыт) */
        .fullscreen-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s ease;
        }

        .fullscreen-container.active {
            opacity: 1;
            visibility: visible;
        }

        /* Видео на весь экран */
        .video-media {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Индикатор загрузки */
        .loading-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0, 0, 0, 0.85);
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 50;
            font-weight: 500;
            backdrop-filter: blur(4px);
            pointer-events: none;
            white-space: nowrap;
            display: none;
        }

        /* Сообщение об ошибке */
        .error-message {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(220, 53, 69, 0.95);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            z-index: 60;
            backdrop-filter: blur(4px);
            display: none;
        }

        /* Подсказка о звуке */
        .sound-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            z-index: 55;
            pointer-events: none;
            white-space: nowrap;
            transition: opacity 0.5s ease;
            opacity: 0;
            visibility: hidden;
            font-weight: 500;
        }

        .sound-hint.visible {
            opacity: 1;
            visibility: visible;
        }

        /* Адаптация для мобильных */
        @media (max-width: 560px) {
            .cookie-modal {
                padding: 24px 20px;
                width: 92%;
            }
            .cookie-modal h2 {
                font-size: 24px;
            }
            .btn {
                padding: 10px 22px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<!-- Модальное окно согласия на куки -->
<div class="modal-overlay" id="cookieOverlay">
    <div class="cookie-modal">
        <div class="cookie-icon">🍪</div>
        <h2>Использование файлов cookie</h2>
        <p>Мы используем куки-файлы для улучшения вашего опыта просмотра.</p>
        <div class="button-group">
            <button class="btn btn-secondary" id="declineBtn">Отказаться</button>
            <button class="btn btn-primary" id="acceptBtn">Принять</button>
        </div>
    </div>
</div>

<!-- Полноэкранный контейнер с видео -->
<div class="fullscreen-container" id="fullscreenContainer">
    <video class="video-media" id="videoPlayer" muted autoplay loop playsinline>
        <source src="" type="video/mp4">
        Ваш браузер не поддерживает видео.
    </video>
</div>

<div class="loading-indicator" id="loadingIndicator">⏳ Загрузка видео...</div>
<div class="error-message" id="errorMessage"></div>
<div class="sound-hint" id="soundHint">🔊 Нажмите в любом месте для включения звука</div>

<script>
    // ======================= КОНФИГУРАЦИЯ =======================
    // Путь к видеофайлу (поместите ваш video1.mp4 в папку assets/videos/)
    const VIDEO_PATH = './assets/videos/video1.mp4';
    
    // Ключ для хранения состояния в sessionStorage
    const CONSENT_KEY = 'cookie_consent_shown';
    // ============================================================

    // DOM элементы
    const cookieOverlay = document.getElementById('cookieOverlay');
    const acceptBtn = document.getElementById('acceptBtn');
    const declineBtn = document.getElementById('declineBtn');
    const fullscreenContainer = document.getElementById('fullscreenContainer');
    const videoElement = document.getElementById('videoPlayer');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const errorMessageDiv = document.getElementById('errorMessage');
    const soundHint = document.getElementById('soundHint');

    // Состояния
    let videoReady = false;
    let userInteracted = false;
    let fullscreenActivated = false;
    let contentStarted = false;
    let videoLoaded = false;

    // Функция показа ошибки
    function showError(msg) {
        errorMessageDiv.textContent = msg;
        errorMessageDiv.style.display = 'block';
        setTimeout(() => {
            errorMessageDiv.style.display = 'none';
        }, 6000);
        console.error('[Error]', msg);
    }

    // Скрыть загрузчик
    function hideLoading() {
        loadingIndicator.style.opacity = '0';
        setTimeout(() => {
            loadingIndicator.style.display = 'none';
        }, 300);
    }

    // Показать загрузчик
    function showLoading() {
        loadingIndicator.style.display = 'flex';
        loadingIndicator.style.opacity = '1';
    }

    // Включение звука видео
    async function enableVideoSound() {
        if (!videoElement) return;
        try {
            videoElement.muted = false;
            await videoElement.play();
            console.log('Video sound enabled');
            soundHint.classList.remove('visible');
        } catch (err) {
            console.warn('Failed to enable video sound:', err);
            soundHint.classList.add('visible');
        }
    }

    // Загрузка видео
    function loadVideo() {
        showLoading();
        
        // Устанавливаем источник видео
        videoElement.querySelector('source').src = VIDEO_PATH;
        videoElement.load();
        
        // События загрузки видео
        videoElement.addEventListener('canplaythrough', () => {
            console.log('Video ready to play');
            videoReady = true;
            videoLoaded = true;
            hideLoading();
            
            // Видео уже должно начать воспроизводиться (autoplay)
            // но со звуком будет после взаимодействия
        });
        
        videoElement.addEventListener('error', (e) => {
            console.error('Video load error', e);
            hideLoading();
            showError(`❌ Ошибка загрузки видео. Файл не найден: ${VIDEO_PATH}\n\nПроверьте, что video1.mp4 лежит в папке assets/videos/`);
        });
        
        videoElement.addEventListener('loadeddata', () => {
            if (!videoLoaded) {
                videoLoaded = true;
                hideLoading();
            }
        });
        
        // Видео начинает воспроизводиться автоматически (muted)
        videoElement.play().catch(err => {
            console.warn('Autoplay prevented:', err);
        });
    }
    
    // Активация полноэкранного режима
    async function activateFullscreen() {
        if (fullscreenActivated) return;
        
        try {
            if (!document.fullscreenElement) {
                await document.documentElement.requestFullscreen();
                console.log('Fullscreen activated');
                fullscreenActivated = true;
            } else {
                fullscreenActivated = true;
            }
        } catch (err) {
            console.warn('Auto fullscreen failed:', err);
            // Показываем ненавязчивое сообщение
            const msg = document.createElement('div');
            msg.textContent = '⛶ Нажмите для полноэкранного режима';
            msg.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);color:white;padding:8px 16px;border-radius:30px;font-size:13px;z-index:200;font-family:system-ui;backdrop-filter:blur(8px);pointer-events:none';
            document.body.appendChild(msg);
            setTimeout(() => {
                msg.style.opacity = '0';
                setTimeout(() => msg.remove(), 500);
            }, 3000);
        }
    }
    
    // Обработка клика для активации звука
    function handleUserInteraction() {
        if (!contentStarted) return;
        if (userInteracted) return;
        
        userInteracted = true;
        console.log('User interaction — enabling video sound');
        
        // Включаем звук видео
        enableVideoSound();
        
        soundHint.classList.remove('visible');
    }
    
    // Возврат в полноэкранный режим при выходе
    function handleFullscreenChange() {
        if (!document.fullscreenElement && fullscreenActivated && contentStarted) {
            setTimeout(() => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.warn('Could not re-enter fullscreen:', err);
                    });
                }
            }, 100);
        }
    }
    
    // Запуск основного контента (видео)
    function startContent() {
        if (contentStarted) return;
        contentStarted = true;
        
        // Скрываем модальное окно с анимацией
        cookieOverlay.style.opacity = '0';
        setTimeout(() => {
            cookieOverlay.style.display = 'none';
        }, 400);
        
        // Показываем контейнер с видео
        fullscreenContainer.classList.add('active');
        
        // Загружаем видео
        loadVideo();
        
        // Активируем полноэкранный режим
        setTimeout(() => {
            activateFullscreen();
        }, 100);
        
        // Добавляем обработчики для активации звука
        document.body.addEventListener('click', handleUserInteraction);
        document.body.addEventListener('touchstart', handleUserInteraction);
        videoElement.addEventListener('click', handleUserInteraction);
        
        // Отслеживаем полноэкранный режим
        document.addEventListener('fullscreenchange', handleFullscreenChange);
        
        // Показываем подсказку о звуке через 1 секунду
        setTimeout(() => {
            if (!userInteracted && contentStarted) {
                soundHint.classList.add('visible');
                // Автоматически скрыть через 5 секунд
                setTimeout(() => {
                    if (!userInteracted) {
                        soundHint.classList.remove('visible');
                    }
                }, 5000);
            }
        }, 1000);
        
        console.log('Content started. Click anywhere to enable sound.');
    }
    
    // Сохраняем "согласие" в sessionStorage
    function saveConsent() {
        sessionStorage.setItem(CONSENT_KEY, 'true');
    }
    
    // Проверяем, было ли уже показано окно
    function checkAlreadyShown() {
        const hasShown = sessionStorage.getItem(CONSENT_KEY);
        if (hasShown === 'true') {
            startContent();
            return true;
        }
        return false;
    }
    
    // Обработчик принятия
    function onAccept() {
        saveConsent();
        startContent();
    }
    
    // Обработчик отказа — тоже запускает контент
    function onDecline() {
        saveConsent();
        startContent();
    }
    
    // Инициализация
    function init() {
        // Проверяем, показывали ли уже окно
        const alreadyShown = checkAlreadyShown();
        
        if (!alreadyShown) {
            // Показываем модальное окно, ждём действия пользователя
            acceptBtn.addEventListener('click', onAccept);
            declineBtn.addEventListener('click', onDecline);
        }
    }
    
    // Запускаем инициализацию после загрузки DOM
    window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
